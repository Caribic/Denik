<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosinec2025</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.5rem; text-align: center; }
        
        .btn-add {
            display: block;
            width: 100%;
            padding: 15px;
            background: #e94560;
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Prosinec 2025</h1>
    
    <div class="card">
        <h2>Aktuální cesta</h2>
        <p>Žádná aktivní mise.</p>
    </div>

    <button class="btn-add">Přidat nové dobrodružství +</button>

</body>
</html>
